<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Starve Style Proto - JS</title>
    <style>
        /* Remove margins and make the canvas fill the whole browser window */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- CONFIGURATION ---
    const TILE_SIZE = 16;
    const WORLD_W = 100;
    const WORLD_H = 100;

    // Resize canvas to fill window
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- LOAD TEXTURES ---
    /* HOW TO USE YOUR PNGS:
    1. Uncomment the 4 lines below.
    2. Delete the "Dummy texture rendering" block inside the drawing loop further down.
    */
    // const grassTex = new Image(); grassTex.src = 'grass.png';
    // const dirtTex = new Image(); dirtTex.src = 'dirt.png';

    // --- TERRAIN GENERATION (Cellular Automata) ---
    let worldGrid = Array.from({ length: WORLD_W }, () => new Array(WORLD_H).fill(0));

    function generateTerrain() {
        // Step 1: Random noise (40% dirt, 60% grass)
        for (let x = 0; x < WORLD_W; x++) {
            for (let y = 0; y < WORLD_H; y++) {
                worldGrid[x][y] = Math.random() < 0.4 ? 1 : 0;
            }
        }

        // Step 2: Smoothing passes
        for (let step = 0; step < 4; step++) {
            let newGrid = worldGrid.map(arr => [...arr]); // Deep copy
            for (let x = 0; x < WORLD_W; x++) {
                for (let y = 0; y < WORLD_H; y++) {
                    let dirtNeighbors = 0;
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            let nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < WORLD_W && ny >= 0 && ny < WORLD_H) {
                                dirtNeighbors += worldGrid[nx][ny];
                            } else {
                                dirtNeighbors += 1; // Edges count as dirt
                            }
                        }
                    }
                    if (dirtNeighbors > 4) newGrid[x][y] = 1;
                    else if (dirtNeighbors < 4) newGrid[x][y] = 0;
                }
            }
            worldGrid = newGrid;
        }
    }
    generateTerrain();

    // --- GAME STATE ---
    const player = {
        x: (WORLD_W * TILE_SIZE) / 2,
        y: (WORLD_H * TILE_SIZE) / 2,
        speed: 100 // Pixels per second
    };

    const camera = {
        x: player.x,
        y: player.y,
        zoom: 3.0
    };

    // --- INPUT HANDLING ---
    const keys = { w: false, a: false, s: false, d: false };

    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key.toLowerCase())) {
            keys[e.key.toLowerCase()] = true;
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key.toLowerCase())) {
            keys[e.key.toLowerCase()] = false;
        }
    });

    window.addEventListener('wheel', (e) => {
        // Scroll to zoom. Clamp between 1.0 (zoomed out) and 6.0 (zoomed in)
        camera.zoom += e.deltaY * -0.002;
        camera.zoom = Math.max(1.0, Math.min(camera.zoom, 6.0));
    });

    // --- GAME LOOP ---
    let lastTime = performance.now();

    function gameLoop(currentTime) {
        const dt = (currentTime - lastTime) / 1000; // Delta time in seconds
        lastTime = currentTime;

        // 1. MOVEMENT UPDATE
        let dx = 0, dy = 0;
        if (keys.w) dy -= 1;
        if (keys.s) dy += 1;
        if (keys.a) dx -= 1;
        if (keys.d) dx += 1;

        // Normalize diagonal movement
        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx * dx + dy * dy);
            dx /= length;
            dy /= length;
        }

        player.x += dx * player.speed * dt;
        player.y += dy * player.speed * dt;

        // 2. CAMERA UPDATE (Smooth follow)
        camera.x += (player.x - camera.x) * 5 * dt;
        camera.y += (player.y - camera.y) * 5 * dt;

        // 3. RENDERING
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        
        // Move canvas origin to screen center, apply zoom, then move camera
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        // Optimization: Only draw tiles that are currently visible on screen
        const leftLimit = camera.x - (canvas.width / 2) / camera.zoom;
        const rightLimit = camera.x + (canvas.width / 2) / camera.zoom;
        const topLimit = camera.y - (canvas.height / 2) / camera.zoom;
        const bottomLimit = camera.y + (canvas.height / 2) / camera.zoom;

        const startCol = Math.max(0, Math.floor(leftLimit / TILE_SIZE));
        const endCol = Math.min(WORLD_W, Math.ceil(rightLimit / TILE_SIZE));
        const startRow = Math.max(0, Math.floor(topLimit / TILE_SIZE));
        const endRow = Math.min(WORLD_H, Math.ceil(bottomLimit / TILE_SIZE));

        // Draw Map
        for (let x = startCol; x < endCol; x++) {
            for (let y = startRow; y < endRow; y++) {
                
                /* --- Dummy texture rendering (Delete this if using images) --- */
                ctx.fillStyle = worldGrid[x][y] === 1 ? '#785028' : '#329632'; // Dirt : Grass
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                /* ------------------------------------------------------------- */

                /* --- Real Image Rendering (Uncomment this when you add your PNGs) --- */
                // const img = worldGrid[x][y] === 1 ? dirtTex : grassTex;
                // ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }

        // Draw Player (Anchor at the feet so they stand ON the tile)
        ctx.fillStyle = 'red';
        ctx.fillRect(player.x - 8, player.y - 24, 16, 24);

        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
